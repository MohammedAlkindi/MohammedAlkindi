name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  isometric:
    name: Isometric contribution calendar
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: MohammedAlkindi
          template: classic
          filename: github-metrics-isometric.svg
          output_action: commit
          committer_message: "Update ${filename} - [Skip GitHub Action]"
          base: ""
          config_timezone: Asia/Dubai

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

  activity-radar:
    name: Activity overview radar chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Generate github-activity-radar.svg
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
          GITHUB_USER: MohammedAlkindi
        run: node .github/scripts/activity-radar.mjs
      - name: Commit chart
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-activity-radar.svg
          git diff --staged --quiet || git commit -m "Update github-activity-radar.svg - [Skip GitHub Action]"
          git push
