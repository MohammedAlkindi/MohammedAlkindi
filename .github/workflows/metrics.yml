name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  activity-radar:
    name: Profile metrics charts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Generate github-activity-radar.svg
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
          GITHUB_USER: MohammedAlkindi
        run: node .github/scripts/activity-radar.mjs
      - name: Generate github-star-lists.svg
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
          GITHUB_USER: MohammedAlkindi
        run: node .github/scripts/star-lists-languages.mjs
      - name: Commit charts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-activity-radar.svg github-star-lists.svg
          git diff --staged --quiet || git commit -m "Update metrics charts - [Skip GitHub Action]"
          git push
