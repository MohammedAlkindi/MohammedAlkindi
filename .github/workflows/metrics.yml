name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main", "master"]

permissions:
  contents: write

jobs:
  terminal:
    name: Terminal-style profile metrics
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: MohammedAlkindi
          template: terminal
          filename: github-metrics-terminal.svg
          output_action: commit
          committer_message: "Update ${filename} - [Skip GitHub Action]"
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Dubai

          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes

          plugin_stargazers: yes
          plugin_stargazers_charts_type: classic
          plugin_stargazers_worldmap: yes

          plugin_code: yes
          plugin_code_lines: 12
          plugin_code_load: 400
          plugin_code_visibility: public

          plugin_discussions: yes
          plugin_discussions_categories: yes

          plugin_gists: yes

  isometric:
    name: Isometric contribution calendar
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: MohammedAlkindi
          template: classic
          filename: github-metrics-isometric.svg
          output_action: commit
          committer_message: "Update ${filename} - [Skip GitHub Action]"
          base: ""
          config_timezone: Asia/Dubai

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
